name: Daily Prospecting Run
on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:
jobs:
  prospecting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - run: npm install --legacy-peer-deps
      - run: npm start
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
          PHANTOM_BUSTER_KEY: ${{ secrets.PHANTOM_BUSTER_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
      - run: git config user.email "bot@minitron" && git config user.name "Bot" && git add . && git commit -m "Results" 2>/dev/null || true && git push 2>/dev/null || true
        continue-on-error: true
