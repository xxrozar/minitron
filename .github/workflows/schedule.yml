name: Daily Prospecting Run

on:
  schedule:
    # Runs at 9 AM UTC daily
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  prospecting:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        run: npm install

      - name: Run Minitron
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm start

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: prospecting-results-${{ github.run_number }}
          path: |
            companies_found.json
            tracking.json

      - name: Commit results
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Minitron Bot"
          git add companies_found.json tracking.json
          git commit -m "Daily prospecting run - $(date)" || echo "No changes"
          git push
        continue-on-error: true
